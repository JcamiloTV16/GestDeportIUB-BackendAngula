<div class="login-page">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-5 shadow-lg border-0 login-card animate__animated animate__fadeIn">
      <div class="text-center mb-4">
        <div class="logo-circle mx-auto mb-3">
          <i class="bi bi-key-fill text-white fs-1"></i>
        </div>
        <h2 class="fw-bold text-primary">Recuperar <span class="text-dark">Contrasena</span></h2>
        <p class="text-muted">Ingresa tu correo electronico</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger text-center py-2">{{ errorMessage }}</div>

      <div *ngIf="resultado" class="alert alert-success border-0 shadow-sm rounded-4 mb-4 text-center">
        <i class="bi bi-check-circle-fill fs-3 d-block mb-2"></i>
        <p class="fw-bold mb-1">Hola, {{ resultado.nombre }}!</p>
        <p class="mb-2 text-muted small">Tu contrasena es:</p>
        <code class="fs-5 text-dark fw-bold user-select-all">{{ resultado.password }}</code>
      </div>

      <ng-container *ngIf="!resultado">
        <div class="form-floating mb-4">
          <input id="recoverEmail" type="email" class="form-control" placeholder="Correo Electronico" [(ngModel)]="email" (keydown.enter)="recuperar()">
          <label for="recoverEmail">Correo Electronico</label>
        </div>
        <button class="btn btn-primary btn-lg w-100 shadow-sm py-3 fw-bold" type="button" (click)="recuperar()" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Buscando...' : 'Recuperar Contrasena' }}
        </button>
      </ng-container>

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-decoration-none text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesion
        </a>
      </div>
    </div>
  </div>
</div>
