<div class="login-page">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-5 shadow-lg border-0 login-card animate__animated animate__fadeIn">
      <div class="text-center mb-4">
        <div class="logo-circle mx-auto mb-3">
          <i class="bi bi-person-badge-fill text-white fs-1"></i>
        </div>
        <h2 class="fw-bold text-primary">GestionDepor<span class="text-dark">IUB</span></h2>
        <p class="text-muted">Inicia sesion para acceder a tu panel</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger text-center py-2">{{ errorMessage }}</div>

      <div class="form-floating mb-3">
        <input id="emailInput" type="email" class="form-control" placeholder="Correo Electronico" [(ngModel)]="email">
        <label for="emailInput">Correo Electronico</label>
      </div>

      <div class="form-floating mb-4">
        <input id="passwordInput" type="password" class="form-control" placeholder="Contrasena" [(ngModel)]="password" (keydown.enter)="iniciarSesion()">
        <label for="passwordInput">Contrasena</label>
      </div>

      <button class="btn btn-primary btn-lg w-100 shadow-sm py-3 fw-bold" type="button" (click)="iniciarSesion()" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Cargando...' : 'Ingresar' }}
      </button>

      <div class="text-center mt-4">
        <a routerLink="/recover" class="text-decoration-none text-muted small">Olvidaste tu contrasena?</a>
      </div>
    </div>
  </div>
</div>
