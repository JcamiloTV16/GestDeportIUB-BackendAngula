<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0">Panel de Deportista</h2>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-2">
      <ul class="nav nav-pills nav-justified">
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'deportes'" (click)="cambiarVista('deportes')">Mis Deportes</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'inscripcion'" (click)="cambiarVista('inscripcion')">Inscripción</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'torneos'" (click)="cambiarVista('torneos')">Torneos</button>
        </li>
      </ul>
    </div>
  </div>

  <div class="card border-0 shadow-sm p-4">
    <div *ngIf="vistaActual === 'deportes'">
      <app-mis-cursos></app-mis-cursos>
    </div>
    <div *ngIf="vistaActual === 'inscripcion'">
      <app-inscripcion-deportes></app-inscripcion-deportes>
    </div>
    <div *ngIf="vistaActual === 'torneos'">
      <app-torneos-estudiante></app-torneos-estudiante>
    </div>
  </div>
</div>
