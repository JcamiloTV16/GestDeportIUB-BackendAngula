<div class="container py-4">
  <h2 class="fw-bold mb-4">Torneos</h2>
  <div *ngIf="loading" class="text-center">
    <div class="spinner-border text-primary" role="status"></div>
  </div>
  <div *ngIf="!loading && torneos.length === 0" class="alert alert-info">
    No hay torneos registrados.
  </div>
  <div class="row g-4" *ngIf="!loading && torneos.length > 0">
    <div class="col-md-4" *ngFor="let torneo of torneos">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ torneo.nombre }}</h5>
          <p class="card-text text-muted">{{ torneo.descripcion }}</p>
          <span class="badge bg-primary">{{ torneo.estado_torneo }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
