<div class="container py-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0">Panel de Administrador</h2>
  </div>

  <!-- Tabs de navegación -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-2">
      <ul class="nav nav-pills nav-justified">
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'dashboard'" (click)="cambiarVista('dashboard')">Dashboard</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'usuarios'" (click)="cambiarVista('usuarios')">Usuarios</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'deportes'" (click)="cambiarVista('deportes')">Deportes</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'cursos'" (click)="cambiarVista('cursos')">Cursos</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'torneos'" (click)="cambiarVista('torneos')">Torneos</button>
        </li>
      </ul>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- DASHBOARD -->
  <!-- ============================================================ -->
  <div *ngIf="vistaActual === 'dashboard'" class="card border-0 shadow-sm p-4">
    <h4 class="fw-bold mb-4">Dashboard Informativo</h4>
    <div class="ratio ratio-16x9" style="min-height: 600px;">
      <iframe title="DASHBOARD DEPOR-UNIBARRANQUILLA" 
              [src]="powerbiUrl" 
              frameborder="0" 
              allowFullScreen="true"
              style="width: 100%; height: 100%;">
      </iframe>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- VISTAS DE FUNCIONALIDADES MODULARIZADAS -->
  <!-- ============================================================ -->

  <app-usuarios-admin *ngIf="vistaActual === 'usuarios'"></app-usuarios-admin>
  <app-deportes-admin *ngIf="vistaActual === 'deportes'"></app-deportes-admin>
  <app-cursos-admin *ngIf="vistaActual === 'cursos'"></app-cursos-admin>
  <app-torneos-admin *ngIf="vistaActual === 'torneos'"></app-torneos-admin>

</div>
