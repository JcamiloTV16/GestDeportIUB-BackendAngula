<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0">Panel de Administrador</h2>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-2">
      <ul class="nav nav-pills nav-justified">
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'dashboard'" (click)="cambiarVista('dashboard')">Dashboard</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'usuarios'" (click)="cambiarVista('usuarios')">Usuarios</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'cursos'" (click)="cambiarVista('cursos')">Cursos</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" [class.active]="vistaActual === 'deportes'" (click)="cambiarVista('deportes')">Deportes</button>
        </li>
      </ul>
    </div>
  </div>

  <div class="card border-0 shadow-sm p-4">
    <div *ngIf="vistaActual === 'dashboard'">
      <h4>Dashboard Informativo</h4>
      <p class="text-muted">Bienvenido al panel de administración.</p>
    </div>
    <div *ngIf="vistaActual === 'usuarios'">
      <!-- Aquí iría el componente de usuarios o un router-outlet -->
      <p>Gestión de usuarios se maneja en la página de usuarios.</p>
    </div>
    <div *ngIf="vistaActual === 'cursos'">
      <p>Gestión de cursos se maneja en la página de cursos.</p>
    </div>
    <div *ngIf="vistaActual === 'deportes'">
      <p>Gestión de deportes se maneja en la página de deportes.</p>
    </div>
  </div>
</div>
